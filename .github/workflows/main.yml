name: 每日自动生成明日排期推送
on:
  # UTC 08:00 = 北京时间 16:00 自动执行
  schedule:
    - cron: '0 8 * * *'
  # 支持手动一键触发测试
  workflow_dispatch:

jobs:
  trigger_task:
    runs-on: ubuntu-latest
    steps:
      - name: 调用PythonAnywhere接口生成排期并推送企业微信
        run: curl -X POST https://ZYL2026.pythonanywhere.com/trigger
