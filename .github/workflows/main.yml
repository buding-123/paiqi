name: 每日自动生成明日排期推送
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  trigger_task:
    runs-on: ubuntu-latest
    steps:
      - name: 先唤醒站点
        run: curl --max-time 6 https://ZYL2026.pythonanywhere.com/trigger || true
      - name: 等待站点启动3秒
        run: sleep 3
      - name: 正式生成排期并推送
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            --max-time 10 \
            https://ZYL2026.pythonanywhere.com/trigger \
          && echo "✅ 接口调用成功，状态码：$?" \
          || echo "❌ 接口调用失败，状态码：$?"
